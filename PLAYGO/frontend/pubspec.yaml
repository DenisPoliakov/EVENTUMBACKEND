name: playgo
description: Mobile app for PlayGO match pickup (Flutter)
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.1.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  google_fonts: ^6.2.1
  intl: ^0.18.1
  http: ^1.2.2
  shared_preferences: ^2.3.3
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/ussian-cities.jso
